<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fond rose poudré -->
  <rect width="32" height="32" rx="7" fill="#EEDFD5"/>

  <!-- Silhouette Pilates : position Teaser (assis, jambes et bras tendus) -->

  <!-- Tête -->
  <circle cx="22" cy="8.5" r="2.8" fill="#C98580"/>

  <!-- Corps incliné (tronc) -->
  <line x1="19.5" y1="10.5" x2="10" y2="18" stroke="#C98580" stroke-width="2" stroke-linecap="round"/>

  <!-- Jambes tendues (diagonale montante) -->
  <line x1="19.5" y1="10.5" x2="28" y2="7" stroke="#C98580" stroke-width="2" stroke-linecap="round"/>

  <!-- Bras tendus vers les jambes -->
  <line x1="14" y1="14" x2="23" y2="9.5" stroke="#C98580" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Sol / tapis -->
  <line x1="5" y1="24" x2="27" y2="24" stroke="#D8C8B8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
